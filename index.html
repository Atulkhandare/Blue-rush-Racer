<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLUE RUSH | ATUL KHANDARE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-blue: #00f0ff;
            --neon-red: #ff0055;
            --neon-green: #00ff64;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Orbitron', sans-serif; -webkit-user-select: none; touch-action: none; }
        body { background: #000; overflow: hidden; height: 100vh; width: 100vw; }

        #game-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        .hud-top { position: absolute; top: 15px; left: 15px; right: 15px; display: flex; justify-content: space-between; z-index: 100; pointer-events: none; }
        .glass { background: rgba(0, 10, 20, 0.85); border: 1px solid var(--neon-blue); padding: 5px 15px; border-radius: 5px; text-align: center; min-width: 80px; }
        .label { font-size: 7px; color: var(--neon-blue); letter-spacing: 1px; }
        #score-txt, #speed-val { font-size: 18px; font-weight: 900; color: #fff; }

        .ui-controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; z-index: 1000; align-items: flex-end; }
        .steering-group { display: flex; gap: 15px; } 
        .pedal-group { display: flex; flex-direction: column; gap: 10px; }

        .circle-btn { width: 65px; height: 65px; border-radius: 50%; border: 3px solid var(--neon-blue); background: rgba(0, 240, 255, 0.1); color: var(--neon-blue); font-size: 20px; outline: none; }
        .pedal { width: 90px; height: 50px; border-radius: 6px; font-weight: 900; font-size: 11px; outline: none; letter-spacing: 1px; }
        .brk { border: 2px solid var(--neon-red); background: rgba(255, 0, 85, 0.1); color: var(--neon-red); }
        .gas { border: 2px solid var(--neon-green); background: rgba(0, 255, 100, 0.1); color: var(--neon-green); }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .glitch { font-size: 12vw; color: #fff; text-shadow: 3px 3px var(--neon-blue); margin-bottom: 25px; text-align: center; }

        .main-btn { padding: 15px 40px; background: var(--neon-blue); border: none; font-weight: 900; border-radius: 4px; color: #000; box-shadow: 0 0 15px var(--neon-blue); cursor: pointer; }

        .small-credit { font-size: 9px; color: rgba(0, 240, 255, 0.5); position: absolute; bottom: 15px; letter-spacing: 2px; text-transform: uppercase; }
        .mission-box { background: rgba(0, 240, 255, 0.05); padding: 15px 30px; border-radius: 8px; border: 1px solid rgba(0, 240, 255, 0.3); text-align: center; margin-bottom: 20px; width: 220px; }
        .mission-label { font-size: 8px; color: var(--neon-blue); letter-spacing: 2px; }
        #final-score { font-size: 32px; color: #fff; margin: 5px 0; }
        .mini-name { font-size: 7px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1px; }

        .hidden { display: none !important; }
    </style>
</head>
<body oncontextmenu="return false;">
    <div id="game-container"></div>

    <div class="hud-top">
        <div class="glass">
            <div class="label">SCORE</div>
            <div id="score-txt">000</div>
        </div>
        <div class="glass">
            <div id="speed-val">0</div>
            <div class="label">KM/H</div>
        </div>
    </div>

    <div class="ui-controls">
        <div class="steering-group">
            <button id="btn-left" class="circle-btn">◀</button>
            <button id="btn-right" class="circle-btn">▶</button>
        </div>
        <div class="pedal-group">
            <button id="btn-brake" class="pedal brk">BRAKE</button>
            <button id="btn-gas" class="pedal gas">GAS</button>
        </div>
    </div>

    <div id="start-screen" class="overlay">
        <h1 class="glitch">BLUE RUSH</h1>
        <button id="start-btn" class="main-btn">INITIATE MISSION</button>
        <p class="small-credit">Developed by Atul Khandare</p>
    </div>

    <div id="over-screen" class="overlay hidden">
        <h1 class="glitch" style="color:var(--neon-red); font-size: 10vw;">CRASHED</h1>
        <div class="mission-box">
            <p class="mission-label">FINAL SCORE</p>
            <h2 id="final-score">0</h2>
            <p class="mini-name">MISSION TERMINATED</p>
        </div>
        <button onclick="location.reload()" class="main-btn" style="padding: 12px 30px;">REBOOT</button>
    </div>

    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    
    <script>
        let scene, camera, renderer, player, speed = 0, score = 0, gameState = "START";
        let currentX = 0, driftAngle = 0;
        const enemies = [], segments = [], keys = { left: false, right: false, gas: false, brake: false };

        document.addEventListener('DOMContentLoaded', () => {
            init();
            setupControls();
        });

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x00050a, 50, 500);
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('game-container').appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1.4));
            const sun = new THREE.DirectionalLight(0x00f0ff, 0.8);
            sun.position.set(5, 10, 5);
            scene.add(sun);

            player = createSportsCar(0x00f0ff);
            scene.add(player);

            for(let i=0; i<45; i++) {
                const seg = createNeonRoad(i * 25);
                segments.push(seg);
                scene.add(seg);
            }

            const colors = [0xff00ff, 0x00ff00, 0xffff00, 0xff0000];
            for(let i=0; i<7; i++) {
                const enemy = createSportsCar(colors[i % colors.length]);
                enemy.position.set((Math.random()-0.5)*16, 0.3, 300 + i*120);
                enemies.push(enemy);
                scene.add(enemy);
            }
            animate();
        }

        function createSportsCar(color) {
            const carGroup = new THREE.Group();
            const bodyMat = new THREE.MeshStandardMaterial({ color, metalness: 0.8, roughness: 0.2, emissive: color, emissiveIntensity: 0.3 });
            const body = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.6, 5), bodyMat);
            const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.7, 0.5, 2.2), new THREE.MeshStandardMaterial({color: 0x050505}));
            cabin.position.set(0, 0.55, -0.3);
            carGroup.add(body, cabin);
            carGroup.position.y = 0.4;
            return carGroup;
        }

        function createNeonRoad(z) {
            const g = new THREE.Group();
            const road = new THREE.Mesh(new THREE.PlaneGeometry(24, 25.1), new THREE.MeshStandardMaterial({color: 0x020202}));
            road.rotation.x = -Math.PI/2;
            const neonMat = new THREE.MeshBasicMaterial({color: 0x00f0ff});
            const l = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 25.1), neonMat);
            l.position.set(-11.8, 0.05, 0); l.rotation.x = -Math.PI/2;
            const r = l.clone(); r.position.x = 11.8;
            const c = new THREE.Mesh(new THREE.PlaneGeometry(0.25, 12), neonMat);
            c.position.set(0, 0.05, 0); c.rotation.x = -Math.PI/2;
            g.add(road, l, r, c);
            g.position.z = z;
            return g;
        }

        function setupControls() {
            document.getElementById('start-btn').onclick = () => {
                gameState = "PLAYING";
                document.getElementById('start-screen').classList.add('hidden');
            };
            const bind = (id, k) => {
                const el = document.getElementById(id);
                el.onpointerdown = (e) => { e.preventDefault(); keys[k] = true; };
                el.onpointerup = (e) => { e.preventDefault(); keys[k] = false; };
                el.onpointerleave = (e) => { keys[k] = false; };
            };
            bind('btn-left', 'left'); bind('btn-right', 'right');
            bind('btn-gas', 'gas'); bind('btn-brake', 'brake');
        }

        function animate() {
            requestAnimationFrame(animate);
            if(gameState === "PLAYING") {
                let targetSpeed = keys.gas ? 12 : 0;
                if(keys.brake) targetSpeed = 0;
                speed = THREE.MathUtils.lerp(speed, targetSpeed, 0.05);
                document.getElementById('speed-val').innerText = Math.floor(speed * 20);
                
                let steer = keys.left ? 0.6 : (keys.right ? -0.6 : 0);
                driftAngle = THREE.MathUtils.lerp(driftAngle, steer, 0.1);
                
                currentX += driftAngle * (speed * 0.15);
                currentX = Math.max(-10.5, Math.min(10.5, currentX));
                
                player.position.x = currentX;
                player.position.z += speed;
                player.rotation.z = -driftAngle * 0.3;
                
                camera.position.set(player.position.x * 0.5, 6, player.position.z - 20);
                camera.lookAt(player.position.x, 1, player.position.z + 30);
                
                score = Math.floor(player.position.z / 10);
                document.getElementById('score-txt').innerText = score.toString().padStart(3, '0');
                
                segments.forEach(s => { if(player.position.z - s.position.z > 50) s.position.z += 1125; });
                enemies.forEach(e => {
                    if(player.position.z - e.position.z > 50) { e.position.z += 800; e.position.x = (Math.random()-0.5)*18; }
                    if(Math.abs(player.position.x - e.position.x) < 2.2 && Math.abs(player.position.z - e.position.z) < 4.5) {
                        gameState = "OVER";
                        document.getElementById('over-screen').classList.remove('hidden');
                        document.getElementById('final-score').innerText = score;
                    }
                });
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
